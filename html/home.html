<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>
    <link rel="stylesheet" href="../css/home.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <header class="top-bar">
        <div class="logo">
            <img src="../img/logo-nexbite.png" alt="NEXBITE">
        </div>
        <div>
            <span id="saudacao">Olá, Maria</span>
            <img class="icon" src="../img/icone-perfil.png">
            <img class="icon" src="../img/icone-carrinho.png">
        </div>
    </header>

    <!-- Carrossel -->
    <section class="carousel">
        <div class="carousel-track">
            <div class="slide">
                <img src="../img/banner-salgado.png" alt="Banner 1">
            </div>
            <div class="slide">
                <img src="../img/banner-doces.png" alt="Banner 2">
            </div>
            <div class="slide">
                <img src="../img/banner-bebidas.png" alt="Banner 3">
            </div>
        </div>

        <div class="dots"></div>

    </section>

    <!-- Menu -->
    <h1 class="title">Categorias</h1>

    <div class="categorias">

        <a href="../html/salgados.html">
        <div class="container">
            <img src="../img/salgados.png">
        </div>
        </a>
        <div container-categorias>

            <a href="../html/doces.html">
                <img src="../img/doces.png">
            </a>

            <a href="../html/bebidas.html">
            <img src="../img/bebidas.png">
            </a>

        </div>

    </div>

    <script src="../js/home.js"></script>


</body>

</html>
