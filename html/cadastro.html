<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;700&display=swap"
        rel="stylesheet">
</head>
<body>

    <div class="cadastro">

        <div class="conta-container">

            <div class="container-imagem">
                <img class="logo" src="../img/logo-nexbite.png" alt="">
                <h2 class="title">Seja Bem-Vindo!</h2>

                <div>
                    <img class="forma-geometrica" src="../img/desenho-cadastro.png" alt="">
                </div>
                <div>
                    <img class="hamburguer" src="../img/hamburguer-cadastro.png" alt="">
                </div>
        </div>

        <div class="formulario">
            <h2 class="subtitle">Cadastro</h2>
            <br>
                <form>
                    <div class="group-cadastro">
                        <label class="nome" for="nome">Nome</label>
                        <br>
                        <input type="text" id="nome" name="nome" required placeholder="Nome" maxlength="20" minlength="4">
                    </div>
                    <br>
                    <div class="group-cadastro">
                        <label class="nome" for="cpf">CPF</label>
                        <br>
                        <input type="text" id="cpf" name="cpf" required placeholder="CPF" maxlength="14">
                    </div>
                    <br>
                    <div class="group-cadastro">
                        <label class="nome" for="email">Email</label>
                        <br>
                        <input type="text" id="email" name="email" required placeholder="Email" maxlength="14">
                    </div>
                    <br>
                    <div class="group-cadastro">
                        <label class="nome" for="telefone">Telefone</label>
                        <br>
                        <input type="text" id="telefone" name="telefone" required placeholder="Telefone" maxlength="15">
                    </div>
                    <br>
                    <div class="group-cadastro">
                        <label class="nome" for="opcoes">Tipo de Usuário</label>
                        <br>
                        <select id="opcoes" name="opcoes" required placeholder="Selecione">
                            <option value="option1"></option>
                            <option value="option2">Funcionário</option>
                            <option value="option3">Aluno</option>
                        </select>
                    </div>
                    <br>
                    <div class="group-cadastro">
                        <label class="nome" for="senha">Senha</label>
                        <br>
                        <input type="text" id="senha" name="senha" required placeholder="Criar senha" maxlength="15">
                    </div>
                    <br><br>
                    <div class="group-cadastro">
                        <label for="senha"></label>
                        <input type="text" id="senha" name="senha" required placeholder="Confirmar senha" maxlength="15">
                    </div>
                    <br><br><br>
                    
                        <div class="btn-container">
                            <button type="submit" class="btn-cadastro" id="proximaEtapa"> <a class="botao-a" href="../html/home.html"> Cadastrar </a></button>
                        </div>

                    <p class="login-link">
                        Já tem uma conta?
                        <a href="#">Entre aqui</a>
                    </p>
                </form>
        </div>

    </div>

</body>
</html>
