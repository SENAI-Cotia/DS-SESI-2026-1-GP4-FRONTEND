<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>
    <link rel="stylesheet" href="./home.css">
</head>

<body>

    <header class="top-bar">
        <div class="logo">
            <img src="./img/logo-nexbite.png" alt="NEXBITE">
        </div>
        <div>
            <span id="saudacao">Olá, Maria</span>
            <img class="icon" src="./img/icone-perfil.png">
            <img class="icon" src="./img/icone-carrinho.png">
        </div>
    </header>

    <section class="carousel">
        <div class="carousel-track">
            <div class="slide">
                <a href="#">
                    <img src="./img/banner-salgado.png" alt="Banner 1">
                </a>
            </div>
            <div class="slide">
                <a href="#">
                    <img src="./img/banner-doces.png" alt="Banner 2">
                </a>
            </div>
            <div class="slide">
                <a href="#">
                    <img src="./img/banner-bebidas.png" alt="Banner 3">
                </a>
            </div>
        </div>

        <div class="dots"></div>

    </section>

    <h1 class="title">Categorias</h1>

    <div class="categorias">

        <div class="container">
            <img src="./img/salgados.png">
        </div>
        
        <div container-categorias>

            <img src="./img/doces.png">
            <img src="./img/bebidas.png">

        </div>

    </div>

    <script src="home.js"></script>


</body>

</html>
