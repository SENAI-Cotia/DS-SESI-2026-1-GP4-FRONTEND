<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="div-pai">

        <div class="Imgs">
            <h1 class="bem-vindo">Bem-vindo de volta!</h1>
            <img class="img-contorcida" src="/assets/Rectangle 80.png" alt="">
            <img class="img-logo" src="/assets/logo.png" alt="">
            <img class="img-lanche" src="/assets/image 23.png" alt="Pizza">
        </div>

        <div class="escrita-login">
            <h1 class="Login">Login</h1>
            <h2 class="entrar-conta">Entre com sua conta</h2>

            <!-- Campo para colocar o nome de usuario -->
          <form action="" class="form-login">
              <div class="campo-usuario">
                <h3 class="usuario">Nome de usuário</h3>
                <input type="text" placeholder="Digite seu nome de usuário">
            </div>
            <br><br>
            <!-- Campo para colocar email -->
            <div class="campo-email">
                <h3 class="email">Email</h3>
                <input type="text" placeholder="Digite seu e-mail">
            </div>
            <br><br>
            <!-- Campo para colocar a senha -->
            <div class="campo-senha">
                <h3 class="senha">Senha</h3>
                <input type="text" placeholder="Digite sua senha">

            </div>
            <!-- Campo para colocar o lembre de mim e esqueci minha senha -->
            <div class="lembre-me">
                <label>
                    <input type="checkbox" name="lembrar"> Lembre de mim
                </label>
                <a class="esquecis" href="">Esqueci minha senha</a>
            </div>
            <br><br>
            <div class="botao">
                <!-- lugar de botao login e a escrita abaixo do botao -->
                <button class="Login-btn">Login</button>
                <div class="cadastro">
                    <h3 class="nao-login">Não possui login?</h3>
                    <a class="cadastro-btn" href="cadastro.html">Cadastre-se</a>
                </div>
            </div>
          </form>
        </div>
    </div>

</body>

</html>
